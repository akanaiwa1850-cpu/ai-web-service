name: Daily AI Website Update

on:
  schedule:
    # 毎日UTCの0:00（日本時間の朝9:00）に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動でいつでも実行できるボタンを追加

jobs:
  update-website:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: AI自動更新スクリプトの実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_site.py

      - name: 変更されたHTMLをコミットしてプッシュ
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily-demo/index.html
          # 変更がある場合のみコミットしてプッシュする
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 AI Auto Update: 毎朝の自動更新" && git push)
