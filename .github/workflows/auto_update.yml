name: Daily AI Website Update

on:
  schedule:
    # GitHubサーバーの混雑（毎時00分）を回避するため、日本時間の朝8:50（UTC 23:50）に確実に実行させる
    - cron: '50 23 * * *'
  workflow_dispatch: # 手動でいつでも実行できるボタンを追加

# ロボットに強制的にファイル書き込み権限（Push権限）を与える
permissions:
  contents: write

jobs:
  update-website:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v3

      - name: Pythonと必要なライブラリのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install tweepy

      - name: AI自動更新＆X（Twitter）自動投稿スクリプトの実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python update_site.py

      - name: 変更されたHTMLをコミットしてプッシュ
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily-demo/index.html lp/index.html
          # 変更がある場合のみコミットしてプッシュする
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 AI Auto Update: 毎朝の自動更新" && git push)
