<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{BusinessName}} | イベント・セミナー型</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e11d48; --bg: #0f172a; --text: #f8fafc; }
        body { margin: 0; font-family: 'Noto Sans JP', sans-serif; color: var(--text); background: var(--bg); text-align: center; }
        .hero { padding: 100px 20px; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); border-bottom: 5px solid var(--primary); }
        .date { font-family: 'Oswald', sans-serif; font-size: 2rem; color: var(--primary); letter-spacing: 5px; margin-bottom: 20px; display: inline-block; border: 2px solid var(--primary); padding: 5px 20px; }
        h1 { font-size: 3rem; font-weight: 900; margin: 0 0 30px 0; line-height: 1.3; }
        .btn { display: inline-block; padding: 20px 60px; background: var(--primary); color: white; text-decoration: none; font-size: 1.5rem; font-weight: bold; border-radius: 8px; box-shadow: 0 10px 20px rgba(225, 29, 72, 0.4); transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .details { padding: 60px 20px; max-width: 800px; margin: 0 auto; text-align: left; }
        .details h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="date">2026.12.01 START</div>
        <h1>{{BusinessName}}<br><span style="font-size: 2rem; font-weight: normal;">{{Catchphrase}}</span></h1>
        <p style="font-size: 1.2rem; margin-bottom: 40px;">今年最大のオンラインカンファレンス、ついに開催。</p>
        <a href="#register" class="btn">今すぐ無料で参加登録</a>
    </div>
    <div class="details">
        <h2>イベント概要</h2>
        <p>業界のトップランナーが集結し、これからのビジネスのあり方を徹底討論します。見逃せない1日をお約束します。</p>
        <h2>タイムテーブル</h2>
        <p>13:00 - オープニングキーノート<br>14:00 - パネルディスカッション<br>16:00 - クロージングセッション</p>
    </div>
</body>
</html>
