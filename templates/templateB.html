<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{BusinessName}} | シンプル</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --primary: #4A90E2; 
        }
        body { margin: 0; font-family: 'Noto Sans JP', sans-serif; background: var(--bg-color); color: var(--text-color); }
        header { padding: 40px 20px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; border-bottom: 1px solid #eee; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .hero { padding: 100px 20px; text-align: center; max-width: 800px; margin: 0 auto; }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        p { font-size: 1.1rem; color: #666; line-height: 1.8; }
        .btn { margin-top: 40px; display: inline-block; padding: 12px 30px; background: var(--primary); color: white; border-radius: 4px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="logo">{{BusinessName}}</div>
        <nav>
            <a href="#about" style="color: #666; text-decoration: none; margin-left: 20px;">About</a>
            <a href="#services" style="color: #666; text-decoration: none; margin-left: 20px;">Services</a>
            <a href="#contact" style="color: #666; text-decoration: none; margin-left: 20px;">Contact</a>
        </nav>
    </header>
    <div class="hero">
        <h1>本質を届ける、<br>シンプルなデザイン。</h1>
        <p>{{Catchphrase}}</p>
        <a href="#contact" class="btn">お問い合わせ</a>
    </div>
</body>
</html>
