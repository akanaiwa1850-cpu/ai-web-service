<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{BusinessName}} | ポップ</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF3E0;
            --text-color: #4A4A4A;
            --primary: #FF5722;
            --secondary: #00BCD4;
        }
        body { margin: 0; font-family: 'Zen Maru Gothic', sans-serif; background: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        .hero { position: relative; padding: 120px 20px; text-align: center; }
        .hero::before { content: ''; position: absolute; top: -50px; left: -50px; width: 200px; height: 200px; background: var(--secondary); border-radius: 50%; z-index: -1; opacity: 0.2; }
        .hero::after { content: ''; position: absolute; bottom: 20px; right: 50px; width: 150px; height: 150px; background: var(--primary); border-radius: 50%; z-index: -1; opacity: 0.2; }
        h1 { font-size: 4.5rem; color: var(--primary); margin-bottom: 10px; font-weight: 900; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        p { font-size: 1.4rem; font-weight: 700; background: white; display: inline-block; padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn { margin-top: 50px; display: inline-block; padding: 15px 40px; background: linear-gradient(45deg, var(--primary), #FF9800); color: white; border-radius: 50px; text-decoration: none; font-size: 1.2rem; font-weight: bold; box-shadow: 0 8px 20px rgba(255, 87, 34, 0.4); transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05) translateY(-5px); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>{{BusinessName}}</h1>
        <p>{{Catchphrase}}</p>
        <br>
        <a href="#menu" class="btn">メニューを見る！</a>
    </div>
</body>
</html>
